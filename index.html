<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

.header {

/* cards */

/* checklist */

<body>

<div class="header">
  <div>

<div class="status-bar" id="statusBar">

<script>
// ── 工具 ──────────────────────────────────────
const fmt = (v,d=2) => (v==null||isNaN(v)) ? null : Number(v).toFixed(d);
const fmtN = (v,d=2) => fmt(v,d) ?? 'N/A';
const fmtP = (v,d=1) => (v==null||isNaN(v)) ? 'N/A' : Number(v).toFixed(d)+'%';
const na = v => v==null || v===undefined || (typeof v==='number' && isNaN(v));

function setStatus(t) { document.getElementById('statusText').textContent = t; }
function showErr(m) {
  document.getElementById('errorText').textContent = '❌ '+m;
  document.getElementById('errorBox').classList.add('show');
}

function updateHint() {
  const m = document.getElementById('market').value;
  const hints = {
    CN: '沪市如 600519，深市如 000858',
    HK: '港股代码如 0700（腾讯）、9988（阿里）',
    US: '美股代码如 AAPL、TSLA、NVDA',
  };
  document.getElementById('tickerHint').textContent = hints[m];
}

// ── CORS 代理 ────────────────────────────────
// 本地代理优先（内网 10.40.81.35:8766），外网代理备用
// 代理地址自适应：同域 /proxy 端点（server.js 提供），外网备用兜底
const LOCAL_PROXY = `${location.protocol}//${location.hostname}${location.port && location.port !== '80' && location.port !== '443' ? ':'+location.port : ''}/proxy`;
const PROXIES = [
  u => `${LOCAL_PROXY}?url=${encodeURIComponent(u)}`,           // 同域代理（最快最稳，GBK自动解码）
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,  // 外网备用1
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,        // 外网备用2
];
async function proxyFetch(url, timeout=12000) {
  // 返回 contents 原始字符串，由调用方自行解析
  for (const pFn of PROXIES) {
    try {
      const res = await Promise.race([
        fetch(pFn(url)),
        new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),timeout))
      ]);
      if (!res.ok) { console.warn('proxy HTTP', res.status); continue; }
      const text = await res.text();
      // 本地代理和 allorigins 都返回 {contents: "..."} 格式
      try {
        const w = JSON.parse(text);
        if (w.contents !== undefined) return w.contents; // 返回原始字符串
        return text; // 直接是内容（corsproxy.io 直接返回原文）
      } catch {
        return text;
      }
    } catch(e) { console.warn('proxy fail:', e.message); }
  }
  throw new Error('数据获取失败（所有代理均不可用）');
}

// 解析 proxyFetch 返回的字符串为 JSON 对象
function parseProxyJson(raw) {
  if (typeof raw === 'object') return raw;
  try { return JSON.parse(raw); } catch { return null; }
}

// ── 腾讯财经实时报价 ─────────────────────────
// 返回：price/pe/pb/high52/low52/turnoverRate/name
// 注：A股股息率改用同花顺税前分红率，此处不再处理
function parseTencentQt(rawText, isAStock) {
  const m = rawText.match(/="([^"]+)"/);
  if (!m) return null;
  const p = m[1].split('~');
  const n = i => { const v=parseFloat(p[i]); return isNaN(v)?null:v; };
  const s = i => (p[i]||'').trim();
  const price = n(3);
  // 美股p[52]是股息率(%)；A股通过同花顺单独获取
  const dividendYield = isAStock ? null : n(52);
  return {
    name:         s(1),
    price,
    pe:           n(39),
    pb:           n(43),
    // A股：高[47]低[48]；美股/港股：高[48]低[49]
    high52:       isAStock ? n(47) : n(48),
    low52:        isAStock ? n(48) : n(49),
    turnoverRate: n(38),   // 换手率%（A股有效）
    dividendYield,         // 仅美股/港股有效
    mktCap:       n(44),   // 亿
    beta:         null,
  };
}

async function fetchTencentQuote(tqCode, isAStock) {
  setStatus(`获取实时报价（腾讯财经）...`);
  const raw = await proxyFetch(`https://qt.gtimg.cn/q=${tqCode}`);
  // raw 是原始字符串，如 v_sh600519="1~贵州茅台~..."
  return parseTencentQt(typeof raw === 'string' ? raw : JSON.stringify(raw), isAStock);
}

// ── 腾讯财经历史K线 ──────────────────────────
// param 格式：sh600519 / hk00700 / usAAPL
async function fetchTencentKline(param, count=500) {
  setStatus(`获取历史K线（腾讯财经）...`);
  const url = `https://proxy.finance.qq.com/ifzqgtimg/appstock/app/newfqkline/get?_var=d&param=${param},day,,,${count},qfq`;
  const raw = await proxyFetch(url);
  // raw 是字符串，格式为 d={...} 或直接 JSON
  let parsed;
  const m = (typeof raw === 'string' ? raw : '').match(/=(\{.+)/s);
  if (m) {
    try { parsed = JSON.parse(m[1]); } catch(e) { throw new Error('K线JSON解析失败: '+e.message); }
  } else {
    parsed = parseProxyJson(raw);
  }
  const inner = parsed?.data?.[param];
  if (!inner) throw new Error('K线数据为空');
  const days = inner.qfqday || inner.day || [];
  // 格式：[日期, 开盘, 收盘, 最高, 最低, 成交量, {}, 换手率, 成交额]
  const closes=[], highs=[], lows=[], opens=[], vols=[], dates=[];
  for (const d of days) {
    if (!d || d.length < 5) continue;
    dates.push(d[0]);
    opens.push(parseFloat(d[1]));
    closes.push(parseFloat(d[2]));
    highs.push(parseFloat(d[3]));
    lows.push(parseFloat(d[4]));
    vols.push(parseInt(d[5])||0);
  }
  return { dates, closes, highs, lows, opens, volumes: vols };
}

// ── 同花顺股息率（A股）─────────────────────
// 从 bonus.html 表格的"税前分红率"列取最新有效值
async function fetchThsiDividendYield(code) {
  setStatus(`获取股息率（同花顺）...`);
  const url = `https://basic.10jqka.com.cn/${code}/bonus.html`;
  const raw = await proxyFetch(url);
  // raw 是已经 GBK→UTF-8 解码的 HTML
  const html = typeof raw === 'string' ? raw : '';

  // 找 bonus_table 表格
  const tableMatch = html.match(/id="bonus_table"([\s\S]+?)<\/table>/);
  if (!tableMatch) return null;
  const tableHtml = tableMatch[1];

  // 逐行解析 <tr>
  const rows = tableHtml.match(/<tr[^>]*>([\s\S]+?)<\/tr>/g) || [];
  for (let i = 1; i < rows.length; i++) {  // 跳过表头
    const row = rows[i];
    const tds = row.match(/<td[^>]*>([\s\S]+?)<\/td>/g) || [];
    if (tds.length < 10) continue;

    // 最后一列 = 税前分红率
    const lastTd = tds[tds.length - 1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
    const m = lastTd.match(/(\d+\.?\d*)%/);
    if (m) {
      const val = parseFloat(m[1]);
      if (val > 0 && val < 30) return val;  // 合理范围
    }
  }
  return null;
}

// ── 东方财富财务数据（A股）───────────────────
async function fetchEMFinance(code) {
  setStatus(`获取财务数据（东方财富）...`);
  const url = `https://datacenter.eastmoney.com/securities/api/data/get?type=RPT_F10_FINANCE_MAINFINADATA&sty=ALL&filter=(SECURITY_CODE%3D%22${code}%22)&p=1&ps=1&sr=-1&st=REPORT_DATE&source=HSF10&client=PC`;
  const raw = await proxyFetch(url);
  const data = parseProxyJson(raw);
  const rows = data?.result?.data;
  if (!rows || rows.length === 0) throw new Error('无财务数据');
  const r = rows[0]; // 最新一期
  return {
    revenueGrowth:   r.TOTALOPERATEREVETZ,  // %
    netProfitGrowth: r.PARENTNETPROFITTZ,   // %
    roe:             r.ROEJQ,               // %
    netMargin:       r.XSJLL,               // %
    grossMargin:     r.XSMLL,              // %
    debtRatio:       r.ZCFZL,              // %
    roic:            r.ROIC,               // %
    reportDate:      r.REPORT_DATE_NAME,   // '2024年报'
    eps:             r.EPSJB,
  };
}

// ── 技术指标计算 ─────────────────────────────
function calcRSI(closes, period=14) {
  if (closes.length < period+1) return null;
  let g=0, l=0;
  for (let i=1;i<=period;i++){const d=closes[i]-closes[i-1]; d>0?g+=d:l+=(-d);}
  g/=period; l/=period;
  for (let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    if(d>0){g=(g*(period-1)+d)/period;l=l*(period-1)/period;}
    else{l=(l*(period-1)+(-d))/period;g=g*(period-1)/period;}
  }
  return l===0?100:100-100/(1+g/l);
}
function calcEMA(a, p) {
  const k=2/(p+1); let e=a[0]; const r=[e];
  for(let i=1;i<a.length;i++){e=a[i]*k+e*(1-k);r.push(e);}
  return r;
}
function calcMACD(c) {
  const e12=calcEMA(c,12), e26=calcEMA(c,26);
  const macd=e12.map((v,i)=>v-e26[i]);
  const sig=calcEMA(macd,9);
  return { macd, sig, hist: macd.map((v,i)=>v-sig[i]) };
}
function calcBB(c, p=20, m=2) {
  if(c.length<p) return null;
  const s=c.slice(-p), avg=s.reduce((a,b)=>a+b,0)/p;
  const std=Math.sqrt(s.reduce((a,b)=>a+(b-avg)**2,0)/p);
  return { upper:avg+m*std, mid:avg, lower:avg-m*std };
}
function calcATR(h,l,c,p=14) {
  const trs=[];
  for(let i=1;i<c.length;i++) trs.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));
  if(trs.length<p) return null;
  return trs.slice(-p).reduce((a,b)=>a+b,0)/p;
}
const sma = (a,p) => a.length<p?null:a.slice(-p).reduce((x,y)=>x+y,0)/p;

// ── 综合分析 ─────────────────────────────────
function analyzeAll(market, info, kline) {
  const { closes, highs, lows, dates } = kline;
  const n = closes.length;
  const price = info.price ?? (n>0?closes[n-1]:null);

  // 技术指标
  const rsi    = closes.length>15 ? calcRSI(closes) : null;
  const {macd, sig, hist} = calcMACD(closes);
  const macdNow=macd[macd.length-1], sigNow=sig[sig.length-1];
  const histNow=hist[hist.length-1], histPrev=hist[hist.length-2];
  const macdBull = macdNow > sigNow;
  const macdCross =
    (macdNow>sigNow && macd[macd.length-2]<=sig[sig.length-2]) ? '金叉 🟢' :
    (macdNow<sigNow && macd[macd.length-2]>=sig[sig.length-2]) ? '死叉 🔴' :
    (macdBull ? '多头排列 🟢' : '空头排列 🔴');

  const bb    = calcBB(closes);
  const bbPct = bb && price ? (price-bb.lower)/(bb.upper-bb.lower) : null;

  // 布林带位置描述（更精细）
  let bbDesc = 'N/A';
  let bbStatus = null; // true=中性/好, false=警惕
  if (bb && price != null) {
    const pct = bbPct;
    if (pct <= 0) {
      bbDesc = `下轨附近（0%）🟢 超卖区域`;
      bbStatus = true;
    } else if (pct <= 0.2) {
      bbDesc = `接近下轨（${fmtP(pct)}）🟢`;
      bbStatus = true;
    } else if (pct <= 0.4) {
      bbDesc = `下轨到中轨之间（${fmtP(pct)}）🟢`;
      bbStatus = true;
    } else if (pct <= 0.6) {
      bbDesc = `中轨附近（${fmtP(pct)}）⬜ 中性`;
      bbStatus = null;
    } else if (pct <= 0.8) {
      bbDesc = `上轨到中轨之间（${fmtP(pct)}）🟡`;
      bbStatus = null;
    } else if (pct < 1.0) {
      bbDesc = `接近上轨（${fmtP(pct)}）🔴 注意回调`;
      bbStatus = false;
    } else {
      bbDesc = `突破上轨（${fmtP(pct)}）🔴 超买，警惕`;
      bbStatus = false;
    }
  }

  const sma50  = sma(closes, 50);
  const sma200 = sma(closes, 200);
  const atr14  = calcATR(highs, lows, closes, 14);

  // 动量（12-1月）
  let momentum = null;
  if (n >= 252) momentum = (closes[n-22]-closes[n-252])/closes[n-252];
  else if (n >= 66) momentum = (closes[n-1]-closes[n-66])/closes[n-66];

  // 52W（优先用腾讯财经的精确值）
  const high52 = info.high52 ?? (n>0?Math.max(...closes.slice(-252).filter(Boolean)):null);
  const low52  = info.low52  ?? (n>0?Math.min(...closes.slice(-252).filter(Boolean)):null);
  const pctFromHigh = (price&&high52) ? (price-high52)/high52 : null;
  const pctFromLow  = (price&&low52)  ? (price-low52)/low52   : null;

  // 近期涨跌：从K线数据中精确计算
  // K线按交易日排列，最后一条是最新价
  // 近1月：约20个交易日前
  // 近3月：约60个交易日前
  let ret1m = null, ret3m = null;
  if (n >= 2) {
    const curPrice = closes[n-1];
    // 找约1月前（20个交易日）
    const idx1m = Math.max(0, n - 21); // n-1是今天，n-21是20个交易日前
    const price1m = closes[idx1m];
    if (price1m && price1m > 0) ret1m = (curPrice - price1m) / price1m;

    // 找约3月前（60个交易日）
    const idx3m = Math.max(0, n - 61);
    const price3m = closes[idx3m];
    if (price3m && price3m > 0) ret3m = (curPrice - price3m) / price3m;
  }

  // 基本面评分
  let pos=0, total=0;
  const sc = c => { total++; if(c===true) pos++; };

  sc(!na(momentum) ? momentum>0 : null);
  sc(!na(rsi) ? rsi>30&&rsi<70 : null);
  sc(macdBull);
  sc(!na(sma50)&&!na(price) ? price>sma50 : null);
  sc(!na(sma200)&&!na(price) ? price>sma200 : null);
  sc(!na(info.pe) ? info.pe<30 : null);
  sc(!na(info.pb) ? info.pb<5 : null);
  sc(!na(info.roe) ? info.roe>12 : null);
  sc(!na(info.revenueGrowth) ? info.revenueGrowth>0 : null);
  sc(!na(info.netMargin) ? info.netMargin>10 : null);

  const verdict =
    pos>=7 ? { l:'建议买入',   cls:'buy',  e:'🟢' } :
    pos>=5 ? { l:'持有观望',   cls:'hold', e:'🟡' } :
             { l:'建议回避',   cls:'sell', e:'🔴' };

  const reason =
    verdict.cls==='buy'  ? `基本面+技术面共振向上（${pos}/${total}项正面），风险收益比良好` :
    verdict.cls==='hold' ? `信号混合（${pos}/${total}项正面），等待催化剂或技术确认` :
                           `正面信号不足（${pos}/${total}项正面），等待更好的买入机会`;

  return {
    price, rsi, macdNow, sigNow, histNow, histPrev, macdCross, macdBull,
    bb, bbPct, bbDesc, bbStatus, sma50, sma200, atr14, momentum,
    high52, low52, pctFromHigh, pctFromLow, ret1m, ret3m,
    pos, total, verdict, reason, info,
  };
}

// ── 渲染报告 ─────────────────────────────────
function mr(label, val, ok, extra='') {
  const icon = ok===true?'✅':ok===false?'❌':'';
  const cls  = ok===true?'g':ok===false?'r':'gr';
  return `<div class="metric-row">
    <div class="ml">${label}</div>
    <div class="mv">${val}${extra}</div>
    <div class="ms ${cls}">${icon}</div>
  </div>`;
}
function ci(text, pass, isSell=false) {
  let cls, mark, note='';
  if (pass===null||pass===undefined) { cls='manual'; mark='⚠️'; note='<div class="cn">需人工确认</div>'; }
  else if (isSell) { cls=pass?'fail':'pass'; mark=pass?'❌':'✅'; }
  else             { cls=pass?'pass':'fail'; mark=pass?'✅':'❌'; }
  return `<div class="ci ${cls}"><div class="cm">${mark}</div><div><div class="ct">${text}</div>${note}</div></div>`;
}

// ── 主流程 ────────────────────────────────────
async function startAnalysis() {
  const market = document.getElementById('market').value;
  let rawTicker = document.getElementById('ticker').value.trim().toUpperCase();
  if (!rawTicker) { alert('请输入股票代码'); return; }

  document.getElementById('btnAnalyze').disabled = true;
  document.getElementById('reportSection').classList.remove('show');
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('statusBar').classList.add('show');

  const sources = [];

  try {
    // 构造各接口所需的代码格式
    let tqCode, emCode, klineParam, isAStock=false;

    if (market === 'CN') {
      isAStock = true;
      const code = rawTicker.split('.')[0];
      const isSH = code.startsWith('6') || code.startsWith('5') || code.startsWith('11');
      tqCode = (isSH?'sh':'sz') + code;
      emCode = code;
      klineParam = tqCode; // sh600519
    } else if (market === 'HK') {
      const code = rawTicker.split('.')[0].padStart(5,'0');
      tqCode = 'hk' + code;
      klineParam = tqCode;
    } else { // US
      const code = rawTicker.split('.')[0];
      tqCode = 'us' + code;
      klineParam = tqCode;
    }

    // 1. 腾讯财经实时报价
    let qt = null;
    try {
      qt = await fetchTencentQuote(tqCode, isAStock);
      sources.push({ name:'腾讯财经·实时报价', ok: true });
    } catch(e) {
      sources.push({ name:'腾讯财经·实时报价', ok: false });
      console.warn('腾讯报价失败:', e.message);
    }

    // 2. 历史K线
    let kline = { closes:[], highs:[], lows:[], opens:[], volumes:[], dates:[] };
    try {
      kline = await fetchTencentKline(klineParam, 500);
      sources.push({ name:`腾讯财经·K线(${kline.closes.length}条)`, ok: true });
    } catch(e) {
      sources.push({ name:'腾讯财经·K线', ok: false });
      console.warn('K线失败:', e.message);
    }

    // 3. 东方财富财务数据（A股）
    let finance = {};
    if (market === 'CN') {
      try {
        finance = await fetchEMFinance(emCode);
        sources.push({ name:'东方财富·财务数据', ok: true });
      } catch(e) {
        sources.push({ name:'东方财富·财务数据', ok: false });
        console.warn('东方财富财务失败:', e.message);
      }
    }

    // 4. 同花顺股息率（A股专用，税前分红率）
    let thsiDividendYield = null;
    if (market === 'CN') {
      try {
        thsiDividendYield = await fetchThsiDividendYield(emCode);
        if (thsiDividendYield != null) {
          sources.push({ name:'同花顺·股息率', ok: true });
        }
      } catch(e) {
        console.warn('同花顺股息率失败:', e.message);
      }
    }

    // 合并数据
    const info = {
      name:           qt?.name ?? null,
      price:          qt?.price ?? (kline.closes.length>0 ? kline.closes[kline.closes.length-1] : null),
      pe:             qt?.pe ?? null,
      pb:             qt?.pb ?? null,
      high52:         qt?.high52 ?? null,
      low52:          qt?.low52 ?? null,
      mktCap:         qt?.mktCap ?? null,
      turnoverRate:   qt?.turnoverRate ?? null,
      // A股：同花顺税前分红率；美股/港股：腾讯财经
      dividendYield:  thsiDividendYield ?? qt?.dividendYield ?? null,
      // 财务数据（A股来自东方财富，其他市场暂无）
      roe:            finance.roe ?? null,
      roic:           finance.roic ?? null,
      grossMargin:    finance.grossMargin ?? null,
      netMargin:      finance.netMargin ?? null,
      debtRatio:      finance.debtRatio ?? null,
      revenueGrowth:  finance.revenueGrowth ?? null,
      netProfitGrowth: finance.netProfitGrowth ?? null,
      reportDate:     finance.reportDate ?? null,
    };

    if (na(info.price) && kline.closes.length === 0) {
      throw new Error(`未能获取到 ${rawTicker} 的数据，请检查代码是否正确（A股无需加.SS/.SZ后缀）`);
    }

    setStatus('正在计算技术指标...');
    const analysisData = analyzeAll(market, info, kline);

    setStatus('正在生成报告...');
    renderReport(market, rawTicker, analysisData, sources);

  } catch(e) {
    showErr(e.message);
    console.error(e);
  }

  document.getElementById('statusBar').classList.remove('show');
  document.getElementById('btnAnalyze').disabled = false;
}

// Enter 键触发
document.getElementById('ticker').addEventListener('keydown', e => {
  if (e.key === 'Enter') startAnalysis();
});
</script>
</body>
</html>
